<!doctype html>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>SDR Frequency Analyzer — Live</title>
<link rel="stylesheet" href="/static/uPlot.min.css" />
<script src="/static/uPlot.iife.min.js"></script>
<style>
  /* Instrument palette from the desktop app: true black, near-black panels,
     gray borders, white text, cyan accents. Trace colors match the renderer. */
  :root {
    --bg: #000; --panel: #0b0d0f; --panel-2: #111417;
    --border: #2a2f35; --text: #f2f5f7; --muted: #8b949e;
    --accent: #22d3ee;              /* cyan interaction accent */
    --live: #22d3ee;                /* clear-write  */
    --maxhold: #b98cff;             /* violet       */
    --minhold: #4f8cff;             /* blue         */
    --avg: #ffd24a;                 /* yellow       */
    --peak: #ff3b3b;                /* auto-peak    */
    font-family: ui-monospace, "JetBrains Mono", "SF Mono", Menlo, monospace;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--text); }
  header {
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
    padding: 10px 16px; background: var(--panel);
    border-bottom: 1px solid var(--border);
  }
  header h1 { font-size: 13px; letter-spacing: .14em; font-weight: 600;
    text-transform: uppercase; margin: 0; color: var(--muted); }
  .dot { width: 9px; height: 9px; border-radius: 50%; background: #444;
    display: inline-block; margin-right: 6px; }
  .dot.on { background: #12c56a; box-shadow: 0 0 8px #12c56a; }
  #status { font-size: 12px; color: var(--muted); }
  .wrap { display: grid; grid-template-columns: 260px 1fr; min-height: calc(100vh - 46px); }
  aside { background: var(--panel); border-right: 1px solid var(--border);
    padding: 14px; display: flex; flex-direction: column; gap: 12px; }
  label { font-size: 11px; color: var(--muted); display: block; margin-bottom: 4px;
    letter-spacing: .04em; text-transform: uppercase; }
  input, select {
    width: 100%; background: var(--panel-2); color: var(--text);
    border: 1px solid var(--border); border-radius: 4px; padding: 7px 8px;
    font: inherit; font-size: 13px;
  }
  input:focus, select:focus { outline: 2px solid var(--accent); outline-offset: 0; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  button {
    width: 100%; padding: 10px; font: inherit; font-weight: 600; cursor: pointer;
    border-radius: 4px; border: 1px solid var(--border);
    background: var(--panel-2); color: var(--text); letter-spacing: .04em;
  }
  button.run { background: var(--accent); color: #04191d; border-color: var(--accent); }
  button.stop { background: #2a0f10; color: var(--peak); border-color: #5a1a1c; }
  main { display: flex; flex-direction: column; min-width: 0; }
  #plot { flex: 1; min-height: 0; padding: 8px 12px; }
  .readouts {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 1px; background: var(--border); border-top: 1px solid var(--border);
  }
  .cell { background: var(--panel); padding: 8px 12px; }
  .cell .k { font-size: 10px; color: var(--muted); text-transform: uppercase;
    letter-spacing: .06em; }
  .cell .v { font-size: 15px; margin-top: 2px; }
  .legend { display: flex; gap: 14px; flex-wrap: wrap; font-size: 11px;
    color: var(--muted); padding: 6px 12px 0; }
  .legend i { width: 18px; height: 3px; display: inline-block; vertical-align: middle;
    margin-right: 5px; }
  .u-tooltip { display: none; }
  .adv { border-top: 1px solid var(--border); padding-top: 12px; }
  .chk { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--muted); }
  .chk input { width: auto; }
</style>

<header>
  <span><span id="dot" class="dot"></span></span>
  <h1>SDR Frequency Analyzer · Live</h1>
  <span id="status">disconnected</span>
  <span id="fps" style="margin-left:auto;color:var(--muted);font-size:12px;">— fps</span>
</header>

<div class="wrap">
  <aside>
    <div>
      <label>Device</label>
      <select id="device">
        <option value="SIMULATOR">Simulator</option>
        <option value="HACKRF">HackRF One</option>
        <option value="USRP">Ettus USRP X301</option>
      </select>
    </div>
    <div>
      <label>Center frequency (MHz)</label>
      <input id="center" type="number" step="0.1" value="100" />
    </div>
    <div class="row">
      <div>
        <label>Sample rate (MS/s)</label>
        <input id="sr" type="number" step="0.5" value="20" />
      </div>
      <div>
        <label>Span (MHz)</label>
        <input id="span" type="number" step="0.5" value="20" />
      </div>
    </div>
    <div>
      <label>Gain (dB)</label>
      <input id="gain" type="number" step="1" value="20" />
    </div>
    <button id="runBtn" class="run">Start acquisition</button>

    <div class="adv">
      <label>Traces</label>
      <div class="chk"><input type="checkbox" id="t_max" /><span>Max hold</span></div>
      <div class="chk"><input type="checkbox" id="t_min" /><span>Min hold</span></div>
      <div class="chk"><input type="checkbox" id="t_avg" /><span>Average</span></div>
    </div>
    <div class="adv">
      <label>Link (reduce over slow connections)</label>
      <select id="decim">
        <option value="0">Full resolution</option>
        <option value="1500">Decimate to 1500 cols</option>
        <option value="800">Decimate to 800 cols</option>
      </select>
      <p style="font-size:11px;color:var(--muted);margin:6px 0 0;">
        Peak-preserving. Use only if the waterfall lags.
      </p>
    </div>
  </aside>

  <main>
    <div class="legend">
      <span><i style="background:var(--live)"></i>Clear-write</span>
      <span><i style="background:var(--maxhold)"></i>Max hold</span>
      <span><i style="background:var(--minhold)"></i>Min hold</span>
      <span><i style="background:var(--avg)"></i>Average</span>
      <span><i style="background:var(--peak)"></i>Peak</span>
    </div>
    <div id="plot"></div>
    <div class="readouts">
      <div class="cell"><div class="k">Peak</div><div class="v" id="r_peak">—</div></div>
      <div class="cell"><div class="k">Peak freq</div><div class="v" id="r_pfreq">—</div></div>
      <div class="cell"><div class="k">Noise floor</div><div class="v" id="r_noise">—</div></div>
      <div class="cell"><div class="k">Occ. bandwidth</div><div class="v" id="r_obw">—</div></div>
      <div class="cell"><div class="k">Channel power</div><div class="v" id="r_cp">—</div></div>
      <div class="cell"><div class="k">RBW</div><div class="v" id="r_rbw">—</div></div>
      <div class="cell"><div class="k">Carriers</div><div class="v" id="r_car">—</div></div>
    </div>
  </main>
</div>

<script>
const css = getComputedStyle(document.documentElement);
const C = n => css.getPropertyValue(n).trim();

// ---- decode binary frame ---------------------------------------------------
// Layout: [u32 headerLen][header JSON][f32 freq][f32 amp][f32 max][f32 min][f32 avg]
function decodeFrame(buf) {
  const dv = new DataView(buf);
  const headerLen = dv.getUint32(0, true);
  const header = JSON.parse(new TextDecoder().decode(new Uint8Array(buf, 4, headerLen)));
  const n = header.n;
  let off = 4 + headerLen;
  const take = () => { const a = new Float32Array(buf, off, n); off += n * 4; return a; };
  const freq = take(), amp = take(), max = take(), min = take(), avg = take();
  return { header, freq, amp, max, min, avg };
}

// ---- uPlot setup -----------------------------------------------------------
const showMax = document.getElementById('t_max');
const showMin = document.getElementById('t_min');
const showAvg = document.getElementById('t_avg');

let u = null;
function makePlot(nFreqMHz) {
  const opts = {
    width: document.getElementById('plot').clientWidth,
    height: document.getElementById('plot').clientHeight,
    pxAlign: false,
    scales: { x: { time: false }, y: { auto: true } },
    axes: [
      { stroke: C('--muted'), grid: { stroke: C('--border'), width: 1 },
        ticks: { stroke: C('--border') }, values: (u, v) => v.map(x => x.toFixed(2)),
        label: 'Frequency (MHz)', labelSize: 22, labelFont: '11px monospace',
        font: '11px monospace' },
      { stroke: C('--muted'), grid: { stroke: C('--border'), width: 1 },
        ticks: { stroke: C('--border') }, label: 'dBFS', labelSize: 22,
        labelFont: '11px monospace', font: '11px monospace' },
    ],
    series: [
      {},
      { label: 'live', stroke: C('--live'), width: 1.4 },
      { label: 'max',  stroke: C('--maxhold'), width: 1, show: showMax.checked },
      { label: 'min',  stroke: C('--minhold'), width: 1, show: showMin.checked },
      { label: 'avg',  stroke: C('--avg'), width: 1, show: showAvg.checked },
    ],
    cursor: { drag: { x: true, y: false }, points: { show: false } },
    legend: { show: false },
  };
  if (u) u.destroy();
  u = new uPlot(opts, [nFreqMHz, [], [], [], []], document.getElementById('plot'));
}

// ---- WebSocket + render loop ----------------------------------------------
let ws = null, running = false;
let frames = 0, lastFpsT = performance.now();
let pending = null;   // latest decoded frame; render on rAF (never per-message)

function connect() {
  ws = new WebSocket(`ws://${location.host}/ws`);
  ws.binaryType = 'arraybuffer';
  ws.onopen = () => setStatus('connected', false);
  ws.onclose = () => { setStatus('disconnected', false); setTimeout(connect, 1000); };
  ws.onmessage = ev => {
    if (typeof ev.data === 'string') return handleText(ev.data);
    pending = decodeFrame(ev.data);
  };
}

function handleText(s) {
  const m = JSON.parse(s);
  if (m.type === 'status') setStatus(m.status, /connect/i.test(m.status));
  else if (m.type === 'error') setStatus('error: ' + m.error, false);
}

function setStatus(text, live) {
  document.getElementById('status').textContent = text;
  document.getElementById('dot').classList.toggle('on', !!live || running);
}

function renderLoop() {
  if (pending) {
    const f = pending; pending = null;
    const fMHz = Array.from(f.freq, hz => hz / 1e6);

    if (!u || u.data[0].length !== fMHz.length) makePlot(fMHz);

    u.setData([
      fMHz,
      Array.from(f.amp),
      Array.from(f.max),
      Array.from(f.min),
      Array.from(f.avg),
    ]);

    // readouts
    const h = f.header;
    let pk = h.peaks && h.peaks[0];
    if (!pk) {
      let bi = 0; for (let i = 1; i < f.amp.length; i++) if (f.amp[i] > f.amp[bi]) bi = i;
      pk = { amplitude: f.amp[bi], frequency: f.freq[bi] };
    }
    setText('r_peak', pk.amplitude.toFixed(2) + ' dBFS');
    setText('r_pfreq', (pk.frequency / 1e6).toFixed(6) + ' MHz');
    setText('r_noise', h.noise_floor.toFixed(2) + ' dBFS');
    setText('r_obw', (h.bandwidth / 1e3).toFixed(3) + ' kHz');
    setText('r_cp', h.channel_power.toFixed(2) + ' dBFS');
    setText('r_rbw', (h.rbw / 1e3).toFixed(3) + ' kHz');
    setText('r_car', String((h.carriers || []).length));

    frames++;
    const now = performance.now();
    if (now - lastFpsT > 500) {
      document.getElementById('fps').textContent =
        (frames * 1000 / (now - lastFpsT)).toFixed(1) + ' fps';
      frames = 0; lastFpsT = now;
    }
  }
  requestAnimationFrame(renderLoop);
}
const setText = (id, v) => document.getElementById(id).textContent = v;

// ---- controls --------------------------------------------------------------
const runBtn = document.getElementById('runBtn');
runBtn.onclick = () => {
  if (running) {
    ws.send(JSON.stringify({ action: 'stop' }));
    running = false; runBtn.textContent = 'Start acquisition';
    runBtn.className = 'run';
  } else {
    ws.send(JSON.stringify({
      action: 'start',
      device_type: document.getElementById('device').value,
      center_frequency: parseFloat(document.getElementById('center').value) * 1e6,
      sample_rate: parseFloat(document.getElementById('sr').value) * 1e6,
      span: parseFloat(document.getElementById('span').value) * 1e6,
      gain: parseFloat(document.getElementById('gain').value),
    }));
    running = true; runBtn.textContent = 'Stop acquisition';
    runBtn.className = 'stop'; setStatus('connecting…', true);
  }
};
for (const el of [showMax, showMin, showAvg]) el.onchange = () => {
  if (!u) return;
  u.setSeries(2, { show: showMax.checked });
  u.setSeries(3, { show: showMin.checked });
  u.setSeries(4, { show: showAvg.checked });
};
document.getElementById('decim').onchange = e => {
  ws && ws.send(JSON.stringify({ action: 'set_decimation', columns: parseInt(e.target.value) || 0 }));
};
window.addEventListener('resize', () => {
  if (u) u.setSize({ width: document.getElementById('plot').clientWidth,
                     height: document.getElementById('plot').clientHeight }); });

connect();
requestAnimationFrame(renderLoop);
</script>
